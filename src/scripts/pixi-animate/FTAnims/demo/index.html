<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>pixi-spine-debug demo</title>
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
    <style>
        body {
            margin: 0; 
            padding: 0;
            background: #ccc;
        }
        div#screen {
            display: block; width: 1200px; height: 640px;
            background: #fff;
            margin: auto;
            margin-top:  25px;
            background-image: url(../rc/img/bkg.jpg);
            background-size: 100%;
            position: relative;
        }
        div#app {
            display: block; width: 680px; height: 640px;
            /*background: rgba(0,0,255,0.55);*/
            position: absolute;
            top: 0; right: 0;
        }
        div#appCtrl {
            display: block; width: 640px; height: 640px;
            background: rgba(0,0,255,0.25);
            position: absolute;
            top: 0; right: 0;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="screen">
        <div id="app"></div>
        <!-- <div id="appCtrl"></div> -->
    </div>
    <script src="../rc/js/pixi/pixi.js"></script>
    <script src="../rc/js/pixi-spine.js"></script>
    <script src="../rc/js/pixi-spine-debug.js"></script>
    <script src="../rc/js/fanim1.js"></script>
</body>
</html>
