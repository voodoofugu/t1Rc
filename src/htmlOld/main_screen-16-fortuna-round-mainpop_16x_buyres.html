<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="user-scalable=0, initial-scale=1.00, width=device-width" />
        <title>Game: Home</title>
        <link href="../styles/css/01-all.css" rel="stylesheet" type="text/css" />
        <link href="../styles/css/v2-screen-main.css" rel="stylesheet" type="text/css" />
        <link href="../styles/css/v2-screen-main.css" rel="stylesheet" type="text/css" />
        <link
            href="../styles/css/v2-screen-fortuna-buyres.css"
            rel="stylesheet"
            type="text/css" />
        <script src="../scripts/FapTitansScripts/jquery-1.9.1.min.js"></script>

        <script>
            $(document).ready(function () {
                $(".btn-simple-gold.btn-ok").on("click", function () {
                    $(".m-popup.sign-in .email").toggleClass("error");
                });
            });
        </script>
    </head>

    <body>
        <div class="main">
            <div class="main-bg"></div>

            <div class="popup-layer" style="display: block">
                <div class="screen-blend-55" style="display: block"></div>

                <div
                    class="m-popup bonus-25 bf-event__buy-keys-pop"
                    style="display: block">
                    <div class="title">Buy energy</div>
                    <div class="keys-card-box">
                        <div class="keys-but-box">
                            <img src="rc/v2-f-e1.png" alt="" />
                        </div>
                        <div class="keys-price">5</div>
                        <!-- <div class="keys-bonus">+5 free</div> -->
                        <div class="keybtn-box">
                            <div class="keybtn">$2.00</div>
                        </div>
                    </div>
                    <div class="keys-card-box">
                        <div class="keys-but-box">
                            <img src="rc/v2-f-e2.png" alt="" />
                        </div>
                        <div class="keys-price">30</div>
                        <!--                <div class="keys-bonus">+20 free</div>-->
                        <div class="keybtn-box">
                            <div class="keybtn">$10.00</div>
                        </div>
                    </div>
                    <div class="keys-card-box">
                        <div class="keys-but-box">
                            <img src="rc/v2-f-e3.png" alt="" />
                        </div>
                        <div class="keys-price">160</div>
                        <!--                <div class="keys-bonus">+200 free</div>-->
                        <div class="keybtn-box">
                            <div class="keybtn">$49.00</div>
                        </div>
                    </div>
                    <div class="keys-card-box">
                        <div class="keys-but-box">
                            <img src="rc/v2-f-e4.png" alt="" />
                        </div>
                        <div class="keys-price">450</div>
                        <!--                <div class="keys-bonus">+2000 free</div>-->
                        <div class="keybtn-box">
                            <div class="keybtn">$99.00</div>
                        </div>
                    </div>

                    <div class="btn-close-x"></div>
                </div>
            </div>
        </div>
    </body>
</html>
