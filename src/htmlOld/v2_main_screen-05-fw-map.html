<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="user-scalable=0, initial-scale=1.00, width=device-width">
    <title>Game: Home</title>
    <link href="rc/01-all.css" rel="stylesheet" type="text/css">
    <link href="rc/v2-screen-main.css" rel="stylesheet" type="text/css">
    <link href="rc/v2-screen-fw-map.css" rel="stylesheet" type="text/css">
    <script src="js/jquery-1.9.1.min.js"></script>
</head>

<body>
    <div class="main"><div class="main-bg fw-map"></div>
        <div class="fw-map-name-box-all">
            <div class="fw-map-time-box">
                <div class="fw-map-time1">битва начнется: 06:59</div>
                <div class="fw-map-time2">награда появится: 23:59</div>
            </div>
            <div class="fw-map-name-box">
                <div class="fw-map-name">фракционные войны</div>
                <div class="fw-map-date">day 31</div>
            </div>
        </div>
        <div class="fw-map-claim-box-all">
            <div class="fw-map-claim-box fr1 w1">
                <div class="fw-icon-fr"><img src="rc/v2-fw-icon-fr1.png"></div>
                <div class="fw-icon-ws"><img src="rc/v2-fw-icon-w1.png"></div>
                <div class="fw-icon-sword"><img src="rc/v2-fw-icon-w3.png"></div>
            </div>
            <div class="fw-map-claim-box fr1 w2">
                <div class="fw-icon-fr"><img src="rc/v2-fw-icon-fr1.png"></div>
                <div class="fw-icon-ws"><img src="rc/v2-fw-icon-w2.png"></div>
                <div class="fw-icon-sword"><img src="rc/v2-fw-icon-w3.png"></div>
            </div>
            <div class="fw-map-claim-box fr1 w3 blue">
                <div class="fw-frac-arrow"></div>
            </div>
            <div class="fw-map-claim-box"></div>
            <div class="fw-map-claim-box"></div>
            <div class="fw-map-claim-box fr2 w1">
                <div class="fw-icon-fr"><img src="rc/v2-fw-icon-fr2.png"></div>
                <div class="fw-icon-ws"><img src="rc/v2-fw-icon-w2.png"></div>
                <div class="fw-icon-sword"><img src="rc/v2-fw-icon-w3.png"></div>
            </div>
            <div class="fw-map-claim-box fr2 w2"></div>
            <div class="fw-map-claim-box fr2 w3"></div>
            <div class="fw-map-claim-box"></div>
            <div class="fw-map-claim-box">
                <div class="fw-icon-fr"><img src="rc/v2-fw-icon-fr4.png"></div>
                <div class="fw-icon-ws"><img src="rc/v2-fw-icon-w1.png"></div>
                <div class="fw-icon-sword"><img src="rc/v2-fw-icon-w3.png"></div>
            </div>
            <div class="fw-map-claim-box fr3 w1 red">
                <div class="fw-frac-arrow"></div>
                <div class="fw-icon-fr"><img src="rc/v2-fw-icon-fr3.png"></div>
                <div class="fw-icon-ws"><img src="rc/v2-fw-icon-w2.png"></div>
                <div class="fw-icon-sword"><img src="rc/v2-fw-icon-w3.png"></div>
            </div>
            <div class="fw-map-claim-box fr3 w2"></div>
            <div class="fw-map-claim-box fr3 w3">
                <div class="fw-icon-fr"><img src="rc/v2-fw-icon-fr1.png"></div>
                <div class="fw-icon-ws"><img src="rc/v2-fw-icon-w1.png"></div>
                <div class="fw-icon-sword"><img src="rc/v2-fw-icon-w3.png"></div>
            </div>
            <div class="fw-map-claim-box"></div>
            <div class="fw-map-claim-box green">
                <div class="fw-frac-arrow"></div>
            </div>
            <div class="fw-map-claim-box w1"></div>
            <div class="fw-map-claim-box w2"></div>
            <div class="fw-map-claim-box w3"></div>
            <div class="fw-map-claim-box"></div>
            <div class="fw-map-claim-box"></div>
        </div>
        <div class="fw-round-box-all">
            <div class="fw-round-box-name">раунд</div>
            <div class="fw-round-box">
                <div class="fw-round-num check">1</div>
                <div class="fw-round-num check">2</div>
                <div class="fw-round-num check">3</div>
                <div class="fw-round-num check">4</div>
                <div class="fw-round-num check">5</div>
                <div class="fw-round-num check">6</div>
                <div class="fw-round-num active">7</div>
                <div class="fw-round-num">8</div>
                <div class="fw-round-num">9</div>
                <div class="fw-round-num">10</div>
                <div class="fw-round-num">11</div>
                <div class="fw-round-num">12</div>
                <div class="fw-round-num">13</div>
                <div class="fw-round-num">14</div>
                <div class="fw-round-num">15</div>
                <div class="fw-round-num">16</div>
            </div>
        </div>
        <div class="fw-myfraction-box">
            <div class="fw-myfraction-pic"><img src="rc/v2-fw-fr-2.png"></div>
            <div class="fw-myfraction-text">моя фракция</div>
            <div class="fw-myfraction-name-box">
                <div class="fw-myfraction-name">Львиное Королевство</div>
            </div>
        </div>
    </div>

</html>
