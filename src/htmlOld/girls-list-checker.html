<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="user-scalable=0, initial-scale=1.00, width=device-width"
    />
    <title>Game: Home</title>
    <link href="rc/01-all.css" rel="stylesheet" type="text/css" />
    <link href="rc/v2-screen-main.css" rel="stylesheet" type="text/css" />
    <link
      href="rc/v2-screen-fortuna-buyres.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="js/jquery-1.9.1.min.js"></script>

    <script>
      $(document).ready(function () {
        for (i = 300; i <= 1000; i++) {
          $(".main").append(
            `<div class="girl" data-id="${i}">
              <div><img class="img" src="./images/hero-all/tithero-${i}/x1/tithero-${i}-1.jpg" alt=""></div>
              <div><img class="img" src="./images/hero-all/tithero-${i}/x1/tithero-${i}-2.jpg" alt=""></div>
              <div><img class="img" src="./images/hero-all/tithero-${i}/x1/tithero-${i}-3.jpg" alt=""></div>
              <div><img class="img" src="./images/hero-all/tithero-${i}/x1/tithero-${i}-4.jpg" alt=""></div>
              <div><img class="img" src="./images/hero-all/tithero-${i}/x1/tithero-${i}-5.jpg" alt=""></div>
              <div><img class="img" src="./images/hero-all/tithero-${i}/x1/ava/tithero-${i}-1-ava.jpg" alt=""></div>
              <div><img class="img" src="./images/hero-all/tithero-${i}/x1/ava/tithero-${i}-2-ava.jpg" alt=""></div>
              <div><img class="img" src="./images/hero-all/tithero-${i}/x1/ava/tithero-${i}-3-ava.jpg" alt=""></div>
              <div><img class="img" src="./images/hero-all/tithero-${i}/x1/ava/tithero-${i}-4-ava.jpg" alt=""></div>
              <div><img class="img" src="./images/hero-all/tithero-${i}/x1/ava/tithero-${i}-5-ava.jpg" alt=""></div>
              <div><img class="img" src="./images/hero-all/tithero-${i}/x2/tithero-${i}-1.jpg" alt=""></div>
              <div><img class="img" src="./images/hero-all/tithero-${i}/x2/tithero-${i}-2.jpg" alt=""></div>
              <div><img class="img" src="./images/hero-all/tithero-${i}/x2/tithero-${i}-3.jpg" alt=""></div>
              <div><img class="img" src="./images/hero-all/tithero-${i}/x2/tithero-${i}-4.jpg" alt=""></div>
              <div><img class="img" src="./images/hero-all/tithero-${i}/x2/tithero-${i}-5.jpg" alt=""></div>
              <div><img class="img" src="./images/hero-all/tithero-${i}/x2/ava/tithero-${i}-1-ava.jpg" alt=""></div>
              <div><img class="img" src="./images/hero-all/tithero-${i}/x2/ava/tithero-${i}-2-ava.jpg" alt=""></div>
              <div><img class="img" src="./images/hero-all/tithero-${i}/x2/ava/tithero-${i}-3-ava.jpg" alt=""></div>
              <div><img class="img" src="./images/hero-all/tithero-${i}/x2/ava/tithero-${i}-4-ava.jpg" alt=""></div>
              <div><img class="img" src="./images/hero-all/tithero-${i}/x2/ava/tithero-${i}-5-ava.jpg" alt=""></div>
            </div>`
          );
        }
        $(".main").append(`<br><br><hr/><br><br>`);
        for (i = 700; i <= 1000; i++) {
          $(".main").append(
            `<div class="girl super" data-id="${i}">
              <div><img class="img" src="./images/superhero/suphero-${i}/x1/${i}sh-1.jpg" alt=""></div>
              <div><img class="img" src="./images/superhero/suphero-${i}/x1/${i}sh-2.jpg" alt=""></div>
              <div><img class="img" src="./images/superhero/suphero-${i}/x1/${i}sh-3.jpg" alt=""></div>
              <div><img class="img" src="./images/superhero/suphero-${i}/x1/${i}sh-4.jpg" alt=""></div>
              <div><img class="img" src="./images/superhero/suphero-${i}/x1/${i}sh-5.jpg" alt=""></div>
              <div><img class="img" src="./images/superhero/suphero-${i}/x1/${i}sh-6.jpg" alt=""></div>
              <div><img class="img" src="./images/superhero/suphero-${i}/x1/avatar/${i}sh-ava-1.jpg" alt=""></div>
              <div><img class="img" src="./images/superhero/suphero-${i}/x1/avatar/${i}sh-ava-2.jpg" alt=""></div>
              <div><img class="img" src="./images/superhero/suphero-${i}/x1/avatar/${i}sh-ava-3.jpg" alt=""></div>
              <div><img class="img" src="./images/superhero/suphero-${i}/x1/avatar/${i}sh-ava-4.jpg" alt=""></div>
              <div><img class="img" src="./images/superhero/suphero-${i}/x1/avatar/${i}sh-ava-5.jpg" alt=""></div>
              <div><img class="img" src="./images/superhero/suphero-${i}/x1/avatar/${i}sh-ava-6.jpg" alt=""></div>
              <div><img class="img" src="./images/superhero/suphero-${i}/x2/${i}sh-1.jpg" alt=""></div>
              <div><img class="img" src="./images/superhero/suphero-${i}/x2/${i}sh-2.jpg" alt=""></div>
              <div><img class="img" src="./images/superhero/suphero-${i}/x2/${i}sh-3.jpg" alt=""></div>
              <div><img class="img" src="./images/superhero/suphero-${i}/x2/${i}sh-4.jpg" alt=""></div>
              <div><img class="img" src="./images/superhero/suphero-${i}/x2/${i}sh-5.jpg" alt=""></div>
              <div><img class="img" src="./images/superhero/suphero-${i}/x2/${i}sh-6.jpg" alt=""></div>
              <div><img class="img" src="./images/superhero/suphero-${i}/x2/avatar/${i}sh-ava-1.jpg" alt=""></div>
              <div><img class="img" src="./images/superhero/suphero-${i}/x2/avatar/${i}sh-ava-2.jpg" alt=""></div>
              <div><img class="img" src="./images/superhero/suphero-${i}/x2/avatar/${i}sh-ava-3.jpg" alt=""></div>
              <div><img class="img" src="./images/superhero/suphero-${i}/x2/avatar/${i}sh-ava-4.jpg" alt=""></div>
              <div><img class="img" src="./images/superhero/suphero-${i}/x2/avatar/${i}sh-ava-5.jpg" alt=""></div>
              <div><img class="img" src="./images/superhero/suphero-${i}/x2/avatar/${i}sh-ava-6.jpg" alt=""></div>
            </div>`
          );
        }

        window.addEventListener("load", () => {
          setTimeout(() => {
            $(".main .girl").each((key, girl) => {
              if ($(girl).height() < 100) {
                girl.remove();
              } else {
                $(girl)
                  .find(".img")
                  .each((ikey, img) => {
                    $(img.parentNode).append(
                      `${img.naturalWidth}x${img.naturalHeight}`
                    );
                  });
              }
            });
          }, 2000);
        });
        $(".main .girl").each((key, cont) => {
          $(cont).append(`<div class="id">${$(cont).attr("data-id")}</div>`);
        });
      });
    </script>
  </head>

  <body>
    <div class="main"></div>
  </body>

  <style>
    .main {
      box-shadow: none !important;
      background: transparent !important;
    }
    .main > div {
      font-size: 0;
      margin-top: 15px;
      padding: 15px;
      box-sizing: border-box;
      color: #fff;
      background: #4d4538;
      position: relative;
      box-shadow: 0 0 2px #000, 0 0 10px #4d4538, 0 0 10px #4d4538,
        0 0 10px #4d4538, 0 0 25px #4d4538;
    }
    .main > div > div {
      display: inline-block;
      font-size: 10px;
    }
    .main > div > div {
      width: 10%;
    }
    .main .super > div {
      width: 8.32%;
    }
    img {
      width: 100%;
    }
    .main > div > div.id {
      position: absolute;
      left: -10%;
      width: 10%;
      top: 15px;
      font-size: 20px;
      background: #4d4538;
    }
  </style>
</html>
