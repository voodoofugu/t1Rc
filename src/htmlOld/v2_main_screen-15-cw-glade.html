<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="user-scalable=0, initial-scale=1.00, width=device-width">
    <title>Game: Home</title>
    <link href="rc/01-all.css" rel="stylesheet" type="text/css">
    <link href="rc/v2-screen-main.css" rel="stylesheet" type="text/css">
    <link href="rc/v2-screen-cw-glade.css" rel="stylesheet" type="text/css">
    <script src="js/jquery-1.9.1.min.js"></script>
</head>

<body>
    <div class="main">
        <div class="cw-content">
            <div class="cw-bg">
                <div class="cw-glade-info raidboss block">
                    <div class="cw-glade-name">clan raids</div>
                </div>
                <div class="cw-glade-raidboss"></div>

                <div class="cw-glade-tree1"></div>

                <div class="cw-glade-info job block">
                    <div class="cw-glade-name">Orders</div>
                </div>
                <div class="cw-glade-job"></div>

                <div class="cw-glade-info skills block">
                    <div class="cw-glade-name">skills</div>
                </div>
                <div class="cw-glade-skills"></div>

                <div class="cw-glade-tree2"></div>

                <div class="cw-glade-info fire block">
                    <div class="cw-glade-name">Clans</div>
                </div>
                <div class="cw-glade-fire"></div>

                <div class="cw-glade-info store block">
                    <div class="cw-glade-name">store</div>
                </div>
                <div class="cw-glade-store"></div>

                <div class="cw-glade-info map block">
                    <div class="cw-glade-name">map</div>
                </div>
                <div class="cw-glade-map"></div>

                <div class="cw-glade-tree3"></div>

                <div class="cw-glade-tree4"></div>
            </div>
            <div class="color-btn exit">
                <div class="color-btn-text">Exit</div>
            </div>
        </div>

    </div>
</body>
</html>
